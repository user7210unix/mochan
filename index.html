<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>4chan Mobile</title>
<link rel="icon" type="image/x-icon" href="https://s.4cdn.org/image/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── THEMES ─────────────────────────────────────────── */
:root {
  --bg:         #f0e0d6;
  --bg2:        #ffffee;
  --bg3:        #d9bfb7;
  --surface:    #ffffee;
  --surface2:   #f0e0d6;
  --border:     #d9bfb7;
  --border2:    #c0a090;
  --accent:     #800000;
  --accent2:    #aa5544;
  --text:       #1a1a1a;
  --text2:      #555;
  --text3:      #888;
  --link:       #34345c;
  --link-h:     #aa5544;
  --op-bg:      #f0e0d6;
  --re-bg:      #d6daf0;
  --re-bdr:     #b7c5d9;
  --green:      #789922;
  --sb-bg:      #1a1a2e;
  --sb-txt:     #e0e0e0;
  --sb-acc:     #c67c3a;
  --overlay:    rgba(0,0,0,.55);
  --r:          3px;
  --nav-h:      46px;
  --font:       'Roboto', sans-serif;
  --mono:       'Roboto Mono', monospace;
}
[data-theme="dark"]{
  --bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;
  --surface:#2a2a2a;--surface2:#333;
  --border:#3a3a3a;--border2:#555;
  --accent:#c67c3a;--accent2:#e09050;
  --text:#e0e0e0;--text2:#aaa;--text3:#777;
  --link:#9999dd;--link-h:#c67c3a;
  --op-bg:#2e2420;--re-bg:#202035;--re-bdr:#38384a;
  --sb-bg:#111118;--sb-acc:#c67c3a;
}
[data-theme="tomorrow"]{
  --bg:#1d1f21;--bg2:#282a2e;--bg3:#373b41;
  --surface:#282a2e;--surface2:#373b41;
  --border:#373b41;--border2:#505359;
  --accent:#81a2be;--accent2:#b294bb;
  --text:#c5c8c6;--text2:#969896;--text3:#707370;
  --link:#81a2be;--link-h:#b294bb;
  --op-bg:#282a2e;--re-bg:#1d2530;--re-bdr:#2d3f4f;
  --green:#b5bd68;--sb-bg:#141416;--sb-acc:#81a2be;
}
[data-theme="yotsuba"]{
  --bg:#fff;--bg2:#ffffee;
  --surface:#ffffee;--surface2:#eef2ff;
  --border:#ddd;--border2:#c0c0c0;
  --accent:#dd3300;--accent2:#ff6600;
  --text:#111;--text2:#555;--text3:#888;
  --link:#34345c;--link-h:#dd3300;
  --op-bg:#ffffee;--re-bg:#eef2ff;--re-bdr:#d0d0e8;
  --sb-bg:#dd3300;--sb-txt:#fff;--sb-acc:#ff9900;
}

/* ── RESET ──────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;scroll-behavior:smooth}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  line-height:1.5;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:contain;
}
a{color:var(--link);text-decoration:none}
a:hover{color:var(--link-h);text-decoration:underline}
img{max-width:100%;display:block}
button{cursor:pointer;font-family:var(--font)}
input,select{font-family:var(--font)}
*{-webkit-tap-highlight-color:transparent}

/* ── SIDEBAR ────────────────────────────────────────── */
#sb-overlay{
  position:fixed;inset:0;z-index:200;
  background:var(--overlay);
  opacity:0;pointer-events:none;
  transition:opacity .25s;
}
#sb-overlay.open{opacity:1;pointer-events:all}

#sidebar{
  position:fixed;top:0;left:0;bottom:0;
  width:min(290px,85vw);
  background:var(--sb-bg);
  color:var(--sb-txt);
  z-index:201;
  transform:translateX(-100%);
  transition:transform .27s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  overflow-y:auto;
  overscroll-behavior:contain;
}
#sidebar.open{transform:translateX(0)}

.sb-head{
  background:var(--sb-acc);color:#fff;
  padding:14px 16px;font-weight:700;font-size:15px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.sb-sec{
  padding:11px 16px 5px;font-size:10px;
  text-transform:uppercase;letter-spacing:.1em;
  color:#888;border-top:1px solid rgba(255,255,255,.07);margin-top:4px;
}
.sb-sec:first-of-type{border-top:none}
.sb-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 16px;font-size:13.5px;color:var(--sb-txt);gap:10px;
}
.sb-row label{display:flex;align-items:center;gap:10px;flex:1;cursor:pointer}

/* toggle */
.tog{position:relative;width:38px;height:22px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog-track{
  position:absolute;inset:0;background:#444;
  border-radius:22px;cursor:pointer;transition:background .2s;
}
.tog input:checked+.tog-track{background:var(--sb-acc)}
.tog-track::after{
  content:'';position:absolute;left:3px;top:3px;
  width:16px;height:16px;background:#fff;border-radius:50%;
  transition:transform .2s;
}
.tog input:checked+.tog-track::after{transform:translateX(16px)}

.sb-sel{
  background:rgba(255,255,255,.08);color:var(--sb-txt);
  border:1px solid rgba(255,255,255,.12);
  border-radius:var(--r);padding:5px 8px;font-size:12.5px;width:115px;
}
.sb-sel option{background:#222}

#sb-boards{display:flex;flex-wrap:wrap;gap:5px;padding:8px 16px 14px}
.sbb{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  color:var(--sb-txt);border-radius:3px;padding:4px 9px;font-size:12.5px;font-weight:500;
}
.sbb:active,.sbb.active{background:var(--sb-acc);border-color:var(--sb-acc);color:#fff}

/* ── TOP NAV ────────────────────────────────────────── */
#topnav{
  position:sticky;top:0;z-index:100;
  height:var(--nav-h);
  background:var(--accent);
  display:flex;align-items:center;
  padding:0 4px;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.nav-logo{
  font-size:16px;font-weight:700;color:#fff;
  letter-spacing:-.3px;padding:0 8px;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.nav-btn{
  background:none;border:none;color:rgba(255,255,255,.9);
  padding:8px 9px;border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.nav-btn:active{background:rgba(255,255,255,.2)}
.nav-btn svg{width:20px;height:20px}

/* search overlay bar */
#search-bar{
  display:none;position:fixed;top:0;left:0;right:0;z-index:102;
  height:var(--nav-h);background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 10px;align-items:center;gap:8px;
}
#search-bar.on{display:flex}
#search-input{
  flex:1;background:var(--bg);border:1px solid var(--border2);
  border-radius:20px;padding:7px 14px;font-size:14px;color:var(--text);outline:none;
}
#search-input:focus{border-color:var(--accent)}
#search-close{background:none;border:none;color:var(--text2);font-size:24px;padding:0 4px;cursor:pointer}

/* ── BREADCRUMB ─────────────────────────────────────── */
#breadcrumb{
  display:none;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:7px 10px;font-size:12px;color:var(--text3);
  align-items:center;gap:5px;flex-wrap:wrap;
}
#breadcrumb.show{display:flex}
#breadcrumb a{color:var(--link);font-weight:500;cursor:pointer}
.bc-sep{color:var(--border2)}

/* ── FILTER BAR ─────────────────────────────────────── */
#filter-bar{
  display:none;
  background:var(--surface2);border-bottom:1px solid var(--border);
  padding:6px 10px;gap:6px;
  overflow-x:auto;align-items:center;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
#filter-bar::-webkit-scrollbar{display:none}
#filter-bar.show{display:flex}
.fchip{
  flex-shrink:0;background:var(--bg);border:1px solid var(--border2);
  border-radius:14px;padding:4px 11px;font-size:12px;color:var(--text2);
  white-space:nowrap;cursor:pointer;
}
.fchip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.fchip:active{opacity:.75}

/* ── VIEWS ──────────────────────────────────────────── */
#home-view,#board-view,#thread-view{display:none}
#home-view.on,#board-view.on,#thread-view.on{display:block}

/* ── HOME / BOARD TILES ─────────────────────────────── */
#bsearch-wrap{
  padding:10px;background:var(--surface);border-bottom:1px solid var(--border);
}
#bsearch{
  width:100%;background:var(--bg);border:1px solid var(--border2);
  border-radius:20px;padding:8px 14px;font-size:14px;color:var(--text);outline:none;
}
#bsearch:focus{border-color:var(--accent)}
#boards-list{padding-bottom:8px}
.bsec-title{
  padding:8px 10px 4px;font-size:10.5px;
  text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-weight:600;
}
.btiles{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
  gap:1px;background:var(--border);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
}
.btile{
  background:var(--surface);padding:10px 8px 9px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;min-height:62px;justify-content:center;
}
.btile:active{background:var(--surface2)}
.bt-name{font-size:14px;font-weight:700;color:var(--accent);line-height:1}
.bt-desc{
  font-size:10px;color:var(--text3);text-align:center;
  line-height:1.2;max-width:80px;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.btile.nsfw .bt-name{color:var(--accent2)}

/* ── BOARD VIEW ─────────────────────────────────────── */
#board-stats{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:7px 10px;font-size:12px;color:var(--text3);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
#board-stats strong{color:var(--text2)}
.view-tog{display:flex;background:var(--bg);border:1px solid var(--border2);border-radius:3px;overflow:hidden}
.view-tog button{
  background:none;border:none;padding:4px 12px;font-size:12px;color:var(--text2);
}
.view-tog button.on{background:var(--accent);color:#fff}

#threads-wrap{}

/* Catalog */
.cat-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:1px;background:var(--border);padding-top:1px;
}
.cat-card{background:var(--surface);cursor:pointer;overflow:hidden;position:relative}
.cat-card:active{opacity:.85}
.cat-thumb{width:100%;aspect-ratio:1;object-fit:cover;background:var(--bg3);display:block}
.no-img-sq{
  width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  background:var(--surface2);color:var(--text3);font-size:26px;
}
.cat-info{padding:6px 7px 8px}
.cat-sub{
  font-size:11.5px;font-weight:600;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;margin-bottom:2px;line-height:1.3;
}
.cat-exc{
  font-size:11px;color:var(--text2);
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
  overflow:hidden;line-height:1.4;
}
.cat-stats{display:flex;gap:6px;margin-top:5px;font-size:10px;color:var(--text3)}
.sticky-badge{
  position:absolute;top:5px;left:5px;
  background:var(--accent);color:#fff;font-size:9px;font-weight:700;
  padding:1px 5px;border-radius:2px;text-transform:uppercase;
}

/* List */
.li-item{
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;cursor:pointer;overflow:hidden;
}
.li-item:active{background:var(--surface2)}
.li-thumb{width:80px;flex-shrink:0;background:var(--bg3)}
.li-thumb img{width:80px;height:80px;object-fit:cover;display:block}
.li-thumb .no-img-sq{width:80px;height:80px;font-size:22px;aspect-ratio:unset}
.li-body{flex:1;padding:8px 10px;min-width:0}
.li-sub{
  font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.li-exc{
  font-size:12px;color:var(--text2);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4;
}
.li-meta{display:flex;gap:8px;margin-top:5px;font-size:11px;color:var(--text3);align-items:center}

/* ── THREAD VIEW ────────────────────────────────────── */
#thread-meta{
  padding:7px 10px;background:var(--surface);border-bottom:1px solid var(--border);
  font-size:12px;color:var(--text3);
}
#thread-meta strong{color:var(--text2)}

.op-post{
  background:var(--op-bg);border-bottom:1px solid var(--border);padding:10px 10px 12px;
}
.post-subj{font-weight:700;color:var(--accent);font-size:14px;margin-bottom:4px}
.post-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.post-date{font-size:11px;color:var(--text3);white-space:nowrap}
.post-no{font-size:11px;color:var(--text3);cursor:pointer}
.post-no:hover,.reply-no:hover{color:var(--accent)}

.file-info{font-size:11px;color:var(--text3);margin-bottom:4px}
.file-info a{color:var(--link)}
.post-img{
  max-width:min(300px,100%);max-height:350px;
  object-fit:contain;border-radius:var(--r);
  cursor:pointer;background:var(--bg3);
}
.post-img.expanded{max-width:100%;max-height:none}
.post-body{font-size:14px;line-height:1.65;word-break:break-word;color:var(--text)}
.post-body .gt{color:var(--green)}
.post-body .ql{color:var(--link);cursor:pointer}
.post-body .ql:hover{color:var(--link-h);text-decoration:underline}
.post-acts{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.post-act{font-size:11px;color:var(--text3);cursor:pointer}
.post-act:hover{color:var(--accent)}

.replies-wrap{padding:0 0 56px}
.re-post{
  background:var(--re-bg);border:1px solid var(--re-bdr);
  border-radius:var(--r);margin:8px 8px 0;padding:8px 9px 9px;overflow:hidden;
}
.re-post.lit{border-color:var(--accent);box-shadow:inset 2px 0 0 var(--accent)}
.re-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.reply-no{font-size:11px;color:var(--text3);cursor:pointer}
.re-img{
  max-width:min(220px,100%);max-height:260px;object-fit:contain;
  border-radius:var(--r);cursor:pointer;background:var(--bg3);margin-bottom:6px;
}
.re-img.expanded{max-width:100%;max-height:none}
.tag{
  display:inline-block;background:var(--bg);border:1px solid var(--border);
  border-radius:2px;padding:1px 5px;font-size:10.5px;color:var(--text3);margin-right:3px;
}
.tag.s{color:var(--accent);border-color:var(--accent)}

/* ── IMAGE OVERLAY ──────────────────────────────────── */
#img-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.93);align-items:center;justify-content:center;padding:10px;
}
#img-overlay.show{display:flex}
#img-overlay img{max-width:100%;max-height:100%;object-fit:contain;border-radius:2px}
#img-ov-close{
  position:fixed;top:12px;right:12px;
  background:rgba(0,0,0,.6);border:none;color:#fff;font-size:22px;
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;z-index:301;cursor:pointer;
}

/* ── QUOTE POPUP ────────────────────────────────────── */
#qpop{
  position:fixed;z-index:150;display:none;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--r);max-width:min(320px,92vw);max-height:200px;
  overflow-y:auto;padding:8px 10px;font-size:12.5px;line-height:1.5;
  box-shadow:0 4px 16px rgba(0,0,0,.25);pointer-events:none;
}

/* ── LOADING / ERROR ────────────────────────────────── */
.spinner-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:50px 20px;gap:12px;color:var(--text3);font-size:13px;
}
.spin{
  width:30px;height:30px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.err{
  margin:16px 10px;background:var(--surface);
  border:1px solid var(--border2);border-left:3px solid #c44;
  border-radius:var(--r);padding:14px;font-size:13px;color:var(--text2);
}
.err strong{color:#c44;display:block;margin-bottom:4px}

/* ── FAB ────────────────────────────────────────────── */
#fab{
  position:fixed;bottom:62px;right:14px;z-index:90;
  width:40px;height:40px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
  opacity:0;pointer-events:none;transition:opacity .2s;
}
#fab.show{opacity:1;pointer-events:all}
#fab:active{opacity:.7}

/* ── BOTTOM NAV ─────────────────────────────────────── */
#bnav{
  position:fixed;bottom:0;left:0;right:0;height:52px;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;z-index:80;
}
.bn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;color:var(--text3);
  font-size:9.5px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;
}
.bn.on{color:var(--accent)}
.bn svg{width:18px;height:18px}
.bn:active{background:var(--surface2)}

/* content padding for bottom nav */
#main{padding-bottom:52px}

/* ── TOAST ──────────────────────────────────────────── */
#toast{
  position:fixed;bottom:68px;left:50%;transform:translateX(-50%);
  background:#333;color:#fff;padding:7px 18px;border-radius:20px;
  font-size:13px;z-index:400;pointer-events:none;
  opacity:0;transition:opacity .2s;white-space:nowrap;
}
#toast.show{opacity:1}

@media(min-width:480px){
  .cat-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
}
</style>
</head>
<body>

<!-- SIDEBAR OVERLAY -->
<div id="sb-overlay"></div>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sb-head">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
    </svg>
    Settings
  </div>

  <div class="sb-sec">Appearance</div>
  <div class="sb-row">
    <span>Theme</span>
    <select class="sb-sel" id="s-theme">
      <option value="futaba">Futaba</option>
      <option value="dark">Dark</option>
      <option value="yotsuba">Yotsuba</option>
      <option value="tomorrow">Tomorrow</option>
    </select>
  </div>
  <div class="sb-row">
    <span>Font Size</span>
    <select class="sb-sel" id="s-fsize">
      <option value="13">Small</option>
      <option value="14">Normal</option>
      <option value="15">Large</option>
      <option value="16">Larger</option>
    </select>
  </div>
  <div class="sb-row">
    <label>Compact replies
      <label class="tog"><input type="checkbox" id="s-compact"><span class="tog-track"></span></label>
    </label>
  </div>

  <div class="sb-sec">Content</div>
  <div class="sb-row">
    <label>Auto-load images
      <label class="tog"><input type="checkbox" id="s-autoimg" checked><span class="tog-track"></span></label>
    </label>
  </div>
  <div class="sb-row">
    <label>Inline image expand
      <label class="tog"><input type="checkbox" id="s-inline" checked><span class="tog-track"></span></label>
    </label>
  </div>
  <div class="sb-row">
    <label>Quote previews
      <label class="tog"><input type="checkbox" id="s-qprev" checked><span class="tog-track"></span></label>
    </label>
  </div>
  <div class="sb-row">
    <label>Hide stubs
      <label class="tog"><input type="checkbox" id="s-stubs"><span class="tog-track"></span></label>
    </label>
  </div>

  <div class="sb-sec">Reader</div>
  <div class="sb-row">
    <label>Open board as catalog
      <label class="tog"><input type="checkbox" id="s-catdef" checked><span class="tog-track"></span></label>
    </label>
  </div>

<script>
(function(){
'use strict';

/* ══════════════════════════════════════════════════════
   PROXY CONFIG
══════════════════════════════════════════════════════ */
const PROXIES = [
  'https://api.codetabs.com/v1/proxy?quest=',
  'https://api.allorigins.win/raw?url=',
  'https://corsproxy.io/?',
];
const IMG_PROXIES = [
  'https://api.codetabs.com/v1/proxy?quest=',
  'https://api.allorigins.win/raw?url=',
  'https://corsproxy.io/?',
];
const API     = 'https://a.4cdn.org';
const IMG_CDN = 'https://i.4cdn.org';

async function apiFetch(url) {
  let lastErr;
  for (let i = 0; i < PROXIES.length; i++) {
    try {
      const res = await fetch(PROXIES[i] + encodeURIComponent(url), {
        signal: AbortSignal.timeout(12000)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      return JSON.parse(text);
    } catch(e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error('All proxies failed');
}

function buildImgSrc(board, tim, ext, thumb, proxyIdx = 0) {
  const path = thumb
    ? `${IMG_CDN}/${board}/${tim}s.jpg`
    : `${IMG_CDN}/${board}/${tim}${ext}`;
  const proxy = IMG_PROXIES[proxyIdx % IMG_PROXIES.length];
  return proxy + encodeURIComponent(path);
}

function setImgWithFallback(imgEl, board, tim, ext, thumb, attempt = 0) {
  if (attempt >= IMG_PROXIES.length) { imgEl.style.opacity = '.25'; return; }
  const src = buildImgSrc(board, tim, ext, thumb, attempt);
  imgEl.src = src;
  imgEl.onerror = () => setImgWithFallback(imgEl, board, tim, ext, thumb, attempt + 1);
}

/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
const ST = {
  boards:    [],
  board:     null,
  boardMeta: null,
  threads:   [],
  threadNo:  null,
  posts:     [],
  view:      'home',
  viewMode:  'catalog',
  query:     '',
  filter:    'all',
  hidden:    new Set(),
  settings:  {},
};

/* ══════════════════════════════════════════════════════
   SETTINGS
══════════════════════════════════════════════════════ */
const DEFS = {
  theme:'futaba', fsize:14, compact:false,
  autoimg:true, inline:true, qprev:true, stubs:false, catdef:true,
};

function loadPrefs(){
  try{ ST.settings = {...DEFS,...JSON.parse(localStorage.getItem('ch2_prefs')||'{}')}; }
  catch{ ST.settings = {...DEFS}; }
}
function savePrefs(){ localStorage.setItem('ch2_prefs', JSON.stringify(ST.settings)); }

function applyPrefs(){
  const p = ST.settings;
  const themeMap = {futaba:'',dark:'dark',yotsuba:'yotsuba',tomorrow:'tomorrow'};
  document.documentElement.dataset.theme = themeMap[p.theme] || '';
  document.documentElement.style.fontSize = p.fsize + 'px';
  g('s-theme').value  = p.theme;
  g('s-fsize').value  = p.fsize;
  g('s-compact').checked = p.compact;
  g('s-autoimg').checked = p.autoimg;
  g('s-inline').checked  = p.inline;
  g('s-qprev').checked   = p.qprev;
  g('s-stubs').checked   = p.stubs;
  g('s-catdef').checked  = p.catdef;
}

/* ══════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════ */
function g(id){ return document.getElementById(id); }

function toast(msg, dur=1800){
  const t = g('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function setTitle(t){
  document.title = t + ' — 4chan';
  g('nav-title').textContent = t;
}

function num(n){ if(!n)return '0'; if(n>=1000)return(n/1000).toFixed(1)+'K'; return ''+n; }

function ago(ts){
  const d = Math.floor(Date.now()/1000) - ts;
  if(d<60)return d+'s'; if(d<3600)return Math.floor(d/60)+'m';
  if(d<86400)return Math.floor(d/3600)+'h'; return Math.floor(d/86400)+'d';
}
function fmtDate(ts){
  const d=new Date(ts*1000), p=n=>(''+n).padStart(2,'0');
  return `${d.getMonth()+1}/${d.getDate()}/${(''+d.getFullYear()).slice(-2)} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
function strip(h){ const d=document.createElement('div'); d.innerHTML=h||''; return d.textContent||''; }

function parseComment(html){
  if(!html) return '';
  let s = html
    .replace(/<br\s*\/?>/gi,'\n')
    .replace(/<wbr\/?>/gi,'')
    .replace(/<a [^>]*class="quotelink"[^>]*>&gt;&gt;(\d+)<\/a>/gi,
      (_,n)=>`<span class="ql" data-no="${n}">&gt;&gt;${n}</span>`)
    .replace(/<span class="quote">(&gt;[^<]*)<\/span>/gi,
      (_,t)=>`<span class="gt">${t}</span>`)
    .replace(/<[^>]+>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#039;/g,"'").replace(/&quot;/g,'"');

  // wrap lines, mark greentext
  return s.split('\n').map(l => {
    l = l.replace(/>>(\d+)/g, (_,n) => `<span class="ql" data-no="${n}">&gt;&gt;${n}</span>`);
    if(l.trimStart().startsWith('&gt;') || l.trimStart().startsWith('>'))
      return `<span class="gt">${l}</span>`;
    return l;
  }).join('<br>');
}

/* ══════════════════════════════════════════════════════
   LAZY IMAGES
══════════════════════════════════════════════════════ */
let _obs = null;
function lazyLoad(container){
  if(_obs) _obs.disconnect();
  _obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting) return;
      const img = e.target;
      const {board,tim,ext,thumb} = img.dataset;
      if(board && tim){
        setImgWithFallback(img, board, tim, ext||'.jpg', !!thumb);
        _obs.unobserve(img);
      }
    });
  },{rootMargin:'250px'});
  container.querySelectorAll('img.lazy').forEach(img=>_obs.observe(img));
}

/* ══════════════════════════════════════════════════════
   BOARDS
══════════════════════════════════════════════════════ */
const NSFW = new Set(['s','hc','hm','h','e','u','d','y','hr','gif','aco','r','b','r9k','pol','trash']);
const CATS = {
  'Japanese Culture':['a','c','w','m','cgl','cm','f','n','jp'],
  'Video Games':['v','vg','vr','vt','vmg','vst','vm'],
  'Interests':['co','g','tv','k','o','an','tg','sp','sci','his','int','out','toy','xs','asp'],
  'Creative':['i','ic','po','p','ck','wg','lit','mu','fa','3','gd','diy'],
  'Media':['wsg','gif','hr'],
  'Other':['b','r9k','pol','biz','x','adv','lgbt','news','wsr','fit','s4s','qa','mlp'],
  'Adult':['s','hc','hm','h','e','u','d','y','t','aco','r'],
};

async function loadBoards(){
  g('boards-list').innerHTML = spinner();
  try{
    const data = await apiFetch(`${API}/boards.json`);
    ST.boards = data.boards || [];
    renderBoards('');
    renderSBBoards();
  } catch(e){
    g('boards-list').innerHTML = err('Failed to load boards', e.message);
  }
}

function renderBoards(q){
  const boards = q
    ? ST.boards.filter(b=> b.board.includes(q.toLowerCase())||b.title.toLowerCase().includes(q.toLowerCase()))
    : ST.boards;

  if(!boards.length){
    g('boards-list').innerHTML = '<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">No boards match</div>';
    return;
  }

  const groups = {};
  boards.forEach(b=>{
    let cat='Other';
    for(const [c,ids] of Object.entries(CATS)) if(ids.includes(b.board)){cat=c;break;}
    if(!groups[cat]) groups[cat]=[];
    groups[cat].push(b);
  });

  let html='';
  for(const [cat,list] of Object.entries(groups)){
    if(!list.length) continue;
    html+=`<div><div class="bsec-title">${cat}</div><div class="btiles">`;
    list.forEach(b=>{
      html+=`<div class="btile${NSFW.has(b.board)?' nsfw':''}" data-board="${b.board}">
        <div class="bt-name">/${b.board}/</div>
        <div class="bt-desc">${b.title}</div>
      </div>`;
    });
    html+=`</div></div>`;
  }
  g('boards-list').innerHTML = html;
}

function renderSBBoards(){
  const pop=['a','b','v','g','pol','sci','his','mu','wsg','gif','r9k','sp','fit','co','tv','x'];
  g('sb-boards').innerHTML = pop.map(b=>`<button class="sbb" data-board="${b}">/${b}/</button>`).join('');
}

/* ══════════════════════════════════════════════════════
   BOARD / CATALOG
══════════════════════════════════════════════════════ */
async function loadBoard(board){
  ST.board   = board;
  ST.filter  = 'all';
  ST.query   = '';

  ST.boardMeta = ST.boards.find(b=>b.board===board) || null;
  const title  = ST.boardMeta ? `/${board}/ - ${ST.boardMeta.title}` : `/${board}/`;
  setTitle(title);

  showView('board');

  g('threads-wrap').innerHTML = spinner(`Loading /${board}/…`);

  try{
    const data = await apiFetch(`${API}/${board}/catalog.json`);
    ST.threads = [];
    (data||[]).forEach(pg=>{ if(pg.threads) ST.threads.push(...pg.threads); });

    ST.viewMode = ST.settings.catdef ? 'catalog' : 'list';
    syncViewBtns();
    renderFilterBar();
    renderThreads();
    g('board-count').innerHTML = `<strong>${ST.threads.length}</strong> threads`;
  } catch(e){
    g('threads-wrap').innerHTML = err(`Failed to load /${board}/`, e.message);
  }
}

function syncViewBtns(){
  g('vc-btn').classList.toggle('on', ST.viewMode==='catalog');
  g('vl-btn').classList.toggle('on', ST.viewMode==='list');
}

const FILTER_DEFS = [
  {id:'all',     label:'All'},
  {id:'sticky',  label:'Sticky'},
  {id:'img',     label:'Image'},
  {id:'recent',  label:'Fresh'},
  {id:'hot',     label:'Popular'},
];

function renderFilterBar(){
  g('filter-bar').innerHTML = FILTER_DEFS.map(f=>
    `<div class="fchip${ST.filter===f.id?' on':''}" data-filter="${f.id}">${f.label}</div>`
  ).join('');
  g('filter-bar').classList.add('show');
}

function filteredThreads(){
  let ts = [...ST.threads];
  if(ST.filter==='sticky')  ts = ts.filter(t=>t.sticky);
  else if(ST.filter==='img') ts = ts.filter(t=>t.tim);
  else if(ST.filter==='recent'){
    const cut = Math.floor(Date.now()/1000) - 3600;
    ts = ts.filter(t=>t.time>cut);
  }
  else if(ST.filter==='hot') ts = ts.sort((a,b)=>(b.replies||0)-(a.replies||0));

  if(ST.query){
    const q = ST.query.toLowerCase();
    ts = ts.filter(t=> (strip(t.sub)||'').toLowerCase().includes(q)
                     ||(strip(t.com)||'').toLowerCase().includes(q));
  }
  return ts;
}

function renderThreads(){
  const ts = filteredThreads();
  const wrap = g('threads-wrap');

  if(!ts.length){
    wrap.innerHTML='<div style="padding:30px;text-align:center;color:var(--text3);font-size:13px">No threads found</div>';
    return;
  }
  if(ST.viewMode==='catalog'){
    wrap.innerHTML=`<div class="cat-grid">${ts.map(t=>catCard(t)).join('')}</div>`;
  } else {
    wrap.innerHTML = ts.map(t=>listItem(t)).join('');
  }
  lazyLoad(wrap);
}

function catCard(t){
  const sub  = t.sub ? strip(t.sub) : '';
  const com  = t.com ? strip(t.com) : '';
  const auto = ST.settings.autoimg;

  const imgHtml = (t.tim && auto)
    ? `<img class="cat-thumb lazy" data-board="${ST.board}" data-tim="${t.tim}" data-ext="${t.ext}" data-thumb="1" src="" alt="" loading="lazy">`
    : `<div class="no-img-sq">📄</div>`;

  return `<div class="cat-card" data-no="${t.no}">
    ${t.sticky?'<div class="sticky-badge">📌</div>':''}
    ${imgHtml}
    <div class="cat-info">
      ${sub?`<div class="cat-sub">${sub}</div>`:''}
      <div class="cat-exc">${(sub||com).slice(0,120)||'(no text)'}</div>
      <div class="cat-stats">
        <span>💬${num(t.replies||0)}</span>
        <span>🖼${num(t.images||0)}</span>
        <span>${ago(t.time)}</span>
      </div>
    </div>
  </div>`;
}

function listItem(t){
  const sub  = t.sub ? strip(t.sub) : '';
  const com  = t.com ? strip(t.com) : '';
  const auto = ST.settings.autoimg;

  const imgHtml = (t.tim && auto)
    ? `<img class="lazy" data-board="${ST.board}" data-tim="${t.tim}" data-ext="${t.ext}" data-thumb="1" src="" alt="" loading="lazy">`
    : `<div class="no-img-sq">📄</div>`;

  return `<div class="li-item" data-no="${t.no}">
    <div class="li-thumb">${imgHtml}</div>
    <div class="li-body">
      <div class="li-sub">${sub||com.slice(0,60)||'(no subject)'}</div>
      <div class="li-exc">${com.slice(0,100)||'(no text)'}</div>
      <div class="li-meta">
        ${t.sticky?'<span>📌</span>':''}
        <span>💬 ${t.replies||0}</span>
        <span>🖼 ${t.images||0}</span>
        <span>${ago(t.time)}</span>
      </div>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════
   THREAD
══════════════════════════════════════════════════════ */
async function loadThread(board, no){
  ST.board    = board;
  ST.threadNo = no;

  showView('thread');
  g('thread-posts').innerHTML = spinner('Loading thread…');
  g('thread-meta').innerHTML  = '';

  try{
    const data = await apiFetch(`${API}/${board}/thread/${no}.json`);
    ST.posts = data.posts || [];
    const op = ST.posts[0];
    const title = op&&op.sub ? strip(op.sub) : `/${board}/ #${no}`;
    setTitle(title);

    // breadcrumb thread label
    const bc = g('bc-thread');
    if(bc){ bc.textContent = title.slice(0,35)+(title.length>35?'…':''); show(bc); }
    const sep2 = g('bc-sep2'); if(sep2) show(sep2);

    renderThread();
  } catch(e){
    g('thread-posts').innerHTML = err('Failed to load thread', e.message);
  }
}

function renderThread(){
  const posts = ST.posts;
  if(!posts.length){ g('thread-posts').innerHTML=err('Empty thread','No posts returned'); return; }

  const op = posts[0];
  const replies = posts.slice(1);

  g('thread-meta').innerHTML =
    `<strong>${replies.length}</strong> replies · <strong>${op.images||0}</strong> images · No.${op.no}`;

  let html = renderOP(op);
  html += '<div class="replies-wrap">';
  replies.forEach(p=>{
    if(ST.hidden.has(p.no)){
      if(!ST.settings.stubs)
        html+=`<div class="re-post" id="p${p.no}" style="opacity:.45;font-size:12px">
          Post #${p.no} hidden — <span class="post-act" data-unhide="${p.no}">Show</span></div>`;
    } else {
      html += renderReply(p);
    }
  });
  html += '</div>';

  g('thread-posts').innerHTML = html;
  lazyLoad(g('thread-posts'));
  hookQuoteLinks();
}

function renderOP(p){
  const sub  = p.sub ? `<div class="post-subj">${strip(p.sub)}</div>` : '';
  const com  = parseComment(p.com||'');
  const file = buildFileHtml(p, 'post-img');
  return `<div class="op-post" id="p${p.no}">
    ${sub}
    <div class="post-hdr">
      <span class="post-date">${fmtDate(p.time)}</span>
      <span class="post-no" data-no="${p.no}">No.${p.no}</span>
      ${p.sticky?'<span class="tag s">Sticky</span>':''}
      ${p.closed?'<span class="tag">Locked</span>':''}
    </div>
    ${file}
    <div class="post-body">${com}</div>
    <div class="post-acts">
      <span class="post-act" data-hide="${p.no}">Hide</span>
    </div>
  </div>`;
}

function renderReply(p){
  const com  = parseComment(p.com||'');
  const file = buildFileHtml(p, 're-img');
  const compact = ST.settings.compact ? 'style="padding:5px 8px"' : '';
  return `<div class="re-post" id="p${p.no}" ${compact}>
    <div class="re-hdr">
      <span class="reply-no" data-no="${p.no}">No.${p.no}</span>
    </div>
    ${file}
    <div class="post-body">${com}</div>
    <div class="post-acts">
      <span class="post-act" data-hide="${p.no}">Hide</span>
    </div>
  </div>`;
}

function buildFileHtml(p, cls){
  if(!p.tim || !p.ext) return '';
  const fname  = `${p.filename||p.tim}${p.ext}`;
  const fsize  = p.fsize ? `${(p.fsize/1024).toFixed(1)} KB` : '';
  const dim    = (p.w&&p.h) ? ` ${p.w}×${p.h}` : '';
  const fullSrc = buildImgSrc(ST.board, p.tim, p.ext, false, 0);

  if(!ST.settings.autoimg)
    return `<div style="font-size:11px;color:var(--text3);margin-bottom:6px">
      File: <a href="${fullSrc}" target="_blank">${fname}</a> (${fsize}${dim})</div>`;

  return `<div style="margin-bottom:6px">
    <div class="file-info">File: <a href="${fullSrc}" target="_blank">${fname}</a> (${fsize}${dim})</div>
    <img class="${cls} lazy${p.spoiler?' spoiler':''}"
      data-board="${ST.board}" data-tim="${p.tim}" data-ext="${p.ext}" data-thumb="1"
      src="" alt="" loading="lazy" data-no="${p.no}">
  </div>`;
}

/* ══════════════════════════════════════════════════════
   QUOTE LINKS
══════════════════════════════════════════════════════ */
function hookQuoteLinks(){
  const popup = g('qpop');
  document.querySelectorAll('.ql').forEach(a=>{
    a.addEventListener('click', e=>{
      e.preventDefault();
      const target = document.getElementById('p'+a.dataset.no);
      if(target){
        target.classList.add('lit');
        target.scrollIntoView({behavior:'smooth',block:'center'});
        setTimeout(()=>target.classList.remove('lit'),2000);
      }
    });

    if(ST.settings.qprev){
      a.addEventListener('mouseenter', ()=>{
        const t = document.getElementById('p'+a.dataset.no);
        if(!t) return;
        const body = t.querySelector('.post-body');
        if(!body) return;
        popup.innerHTML = body.innerHTML;
        popup.style.display = 'block';
        const r = a.getBoundingClientRect();
        let top = r.top - 210;
        if(top < 8) top = r.bottom + 8;
        popup.style.top  = Math.max(8,top)+'px';
        popup.style.left = Math.min(r.left, window.innerWidth-330)+'px';
      });
      a.addEventListener('mouseleave', ()=>{ popup.style.display='none'; });
    }
  });
}

/* ══════════════════════════════════════════════════════
   VIEW MANAGEMENT
══════════════════════════════════════════════════════ */
function showView(view){
  ST.view = view;

  g('home-view').classList.toggle('on', view==='home');
  g('board-view').classList.toggle('on', view==='board');
  g('thread-view').classList.toggle('on', view==='thread');

  // breadcrumb
  if(view==='home'){
    g('breadcrumb').classList.remove('show');
    g('filter-bar').classList.remove('show');
    setTitle('4chan');
    setAllBnav(false);
    g('bn-home').classList.add('on');
  } else {
    g('breadcrumb').classList.add('show');
    // board parts
    const bcb = g('bc-board'), sep1=g('bc-sep1');
    if(bcb){ bcb.textContent=`/${ST.board}/`; show(bcb); }
    if(sep1) show(sep1);
    // thread parts — hide if going back to board
    if(view==='board'){
      const bct=g('bc-thread'), sep2=g('bc-sep2');
      if(bct) hide(bct); if(sep2) hide(sep2);
    }
    setAllBnav(false);
  }

  window.scrollTo(0,0);
  closeSB();
  g('search-bar').classList.remove('on');
  g('search-input').value = '';
  ST.query = '';
}

function show(el){ if(el) el.style.display=''; }
function hide(el){ if(el) el.style.display='none'; }
function setAllBnav(v){ document.querySelectorAll('.bn').forEach(b=>b.classList.toggle('on',v)); }

/* ══════════════════════════════════════════════════════
   IMAGE EXPAND
══════════════════════════════════════════════════════ */
function handleImgClick(img){
  const {board,tim,ext} = img.dataset;
  if(!board||!tim) return;

  if(ST.settings.inline && !img.classList.contains('expanded')){
    img.classList.add('expanded');
    setImgWithFallback(img, board, tim, ext||'.jpg', false);
    return;
  }

  // fullscreen overlay
  const ov = g('img-overlay'), ovImg = g('img-ov-img');
  setImgWithFallback(ovImg, board, tim, ext||'.jpg', false);
  ov.classList.add('show');
  document.body.style.overflow='hidden';
}

/* ══════════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════════ */
function openSB(){
  g('sidebar').classList.add('open');
  g('sb-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSB(){
  g('sidebar').classList.remove('open');
  g('sb-overlay').classList.remove('open');
  document.body.style.overflow='';
}

/* ══════════════════════════════════════════════════════
   SPINNER / ERR HELPERS
══════════════════════════════════════════════════════ */
function spinner(msg='Loading…'){
  return `<div class="spinner-wrap"><div class="spin"></div><span>${msg}</span></div>`;
}
function err(title,detail=''){
  return `<div class="err"><strong>${title}</strong>${detail}</div>`;
}

/* ══════════════════════════════════════════════════════
   EVENT DELEGATION — single listener, covers everything
══════════════════════════════════════════════════════ */
document.addEventListener('click', e=>{
  const t = e.target;

  // Board tile (home)
  const tile = t.closest('.btile');
  if(tile){ const b=tile.dataset.board; goBoard(b); return; }

  // Catalog card
  const card = t.closest('.cat-card');
  if(card && !t.closest('.post-act')){ goThread(ST.board, card.dataset.no); return; }

  // List item
  const li = t.closest('.li-item');
  if(li && !t.closest('.post-act')){ goThread(ST.board, li.dataset.no); return; }

  // Image click
  const img = t.closest('.post-img,.re-img');
  if(img && img.dataset.board){ handleImgClick(img); return; }

  // Overlay close
  if(t.id==='img-overlay'||t.id==='img-ov-close'){
    g('img-overlay').classList.remove('show');
    document.body.style.overflow='';
    return;
  }

  // Post number — copy to clipboard
  if(t.classList.contains('post-no')||t.classList.contains('reply-no')){
    const no=t.dataset.no;
    navigator.clipboard?.writeText(`>>${no}`).catch(()=>{});
    toast(`Copied >>${no}`);
    return;
  }

  // Hide post
  if(t.dataset.hide){
    const no=+t.dataset.hide;
    ST.hidden.add(no);
    const pel=document.getElementById('p'+no);
    if(pel){
      if(ST.settings.stubs) pel.remove();
      else{
        const body=pel.querySelector('.post-body');
        if(body) body.style.display='none';
        pel.style.opacity='.4';
        const acts=pel.querySelector('.post-acts');
        if(acts) acts.innerHTML=`<span class="post-act" data-unhide="${no}">Show</span>`;
      }
    }
    return;
  }
  // Unhide
  if(t.dataset.unhide){
    const no=+t.dataset.unhide;
    ST.hidden.delete(no);
    renderThread();
    return;
  }

  // Filter chip
  const chip = t.closest('.fchip');
  if(chip){
    ST.filter = chip.dataset.filter;
    document.querySelectorAll('.fchip').forEach(c=>c.classList.toggle('on', c.dataset.filter===ST.filter));
    renderThreads();
    return;
  }

  // Sidebar quick board
  const sbb = t.closest('.sbb');
  if(sbb){ goBoard(sbb.dataset.board); return; }

  // Breadcrumb home
  if(t.id==='bc-home'){ e.preventDefault(); goHome(); return; }

  // Breadcrumb board
  if(t.id==='bc-board' && ST.board){ e.preventDefault(); goBoard(ST.board); return; }
});

/* ══════════════════════════════════════════════════════
   NAVIGATION HELPERS
══════════════════════════════════════════════════════ */
function goHome(){
  showView('home');
  history.pushState({view:'home'},'','#');
}
function goBoard(board){
  history.pushState({view:'board',board},'',`#/${board}/`);
  loadBoard(board);
}
function goThread(board, no){
  history.pushState({view:'thread',board,no},'',`#/${board}/${no}`);
  loadThread(board, no);
}

window.addEventListener('popstate', e=>{
  const s = e.state;
  if(!s||s.view==='home')        showView('home'), renderBoards('');
  else if(s.view==='board')      loadBoard(s.board);
  else if(s.view==='thread')     loadThread(s.board, s.no);
});

/* ══════════════════════════════════════════════════════
   BUTTON WIRING
══════════════════════════════════════════════════════ */
g('btn-menu').addEventListener('click', openSB);
g('sb-overlay').addEventListener('click', closeSB);
g('bn-settings').addEventListener('click', openSB);

g('search-input').addEventListener('input', e=>{
  ST.query = e.target.value.trim();
  if(ST.view==='board') renderThreads();
});

g('bsearch').addEventListener('input', e=>{ renderBoards(e.target.value.trim()); });

function doRefresh(){
  if(ST.view==='board')        loadBoard(ST.board);
  else if(ST.view==='thread')  loadThread(ST.board, ST.threadNo);
  else                         loadBoards();
}
g('btn-refresh').addEventListener('click', doRefresh);
g('bn-refresh').addEventListener('click', doRefresh);
g('bn-home').addEventListener('click', goHome);
g('bn-back').addEventListener('click', ()=>history.back());
g('bn-top').addEventListener('click', ()=>window.scrollTo({top:0,behavior:'smooth'}));

g('vc-btn').addEventListener('click', ()=>{ ST.viewMode='catalog'; syncViewBtns(); renderThreads(); });
g('vl-btn').addEventListener('click', ()=>{ ST.viewMode='list';    syncViewBtns(); renderThreads(); });

/* settings panel */
g('s-theme').addEventListener('change',  e=>{
  ST.settings.theme=e.target.value;
  const m={futaba:'',dark:'dark',yotsuba:'yotsuba',tomorrow:'tomorrow'};

['compact','autoimg','inline','qprev','stubs','catdef'].forEach(k=>{

g('s-reset').addEventListener('click', ()=>{

});

/* FAB */
const fab = g('fab');
window.addEventListener('scroll', ()=>fab.classList.toggle('show', window.scrollY>500), {passive:true});
fab.addEventListener('click', ()=>window.scrollTo({top:0,behavior:'smooth'}));

/* Image overlay close on backdrop click */
g('img-overlay').addEventListener('click', e=>{
  if(e.target===g('img-overlay')){
    g('img-overlay').classList.remove('show');
    document.body.style.overflow='';
  }
});

/* ══════════════════════════════════════════════════════
   HASH ROUTING
══════════════════════════════════════════════════════ */
function parseHash(){
  const h = location.hash.replace(/^#\/?/,'');
  const p = h.split('/').filter(Boolean);
  if(!p.length)     return {view:'home'};
  if(p.length===1)  return {view:'board',board:p[0]};
  return {view:'thread',board:p[0],no:p[1]};
}

/* ══════════════════════════════════════════════════════
   INIT — wrapped in DOMContentLoaded to guarantee DOM ready
══════════════════════════════════════════════════════ */
async function init(){
  loadPrefs();
  applyPrefs();

  // boards always loaded first so meta is available
  await loadBoards();

  const route = parseHash();

  if(route.view==='thread'){
    showView('thread');
    loadThread(route.board, route.no);
    history.replaceState({view:'thread',board:route.board,no:route.no},'',location.hash);
  } else if(route.view==='board'){
    loadBoard(route.board);
    history.replaceState({view:'board',board:route.board},'',location.hash);
  } else {
    showView('home');
    history.replaceState({view:'home'},'','#');
  }
}

// Guaranteed: DOM is parsed before script runs (script is at bottom of body)
// but still wrap in DOMContentLoaded as defensive measure
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
